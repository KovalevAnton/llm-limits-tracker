<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LLM Limits</title>
  <meta name="description" content="Local dashboard for LLM API rate limits across Claude, GPT, Gemini, OpenRouter, Groq, Fireworks, Mistral and Together. Zero dependencies." />
  <meta name="theme-color" content="#dde4ee" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#06070d" media="(prefers-color-scheme: dark)" />
  <meta property="og:title" content="LLM Limits" />
  <meta property="og:description" content="Local dashboard for LLM API rate limits — 8 providers, 3 themes, 5 languages, zero dependencies." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="apple-touch-icon.svg" />
  <meta name="twitter:card" content="summary" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="apple-touch-icon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <script>
    // Boot: resolve theme before stylesheet evaluates to avoid a flash of the
    // wrong palette. Migrates legacy theme keys (dark/light/glass/gpro/off)
    // from earlier versions onto the current set.
    (function () {
      try {
        var KEY = 'llm-limits-tracker.theme';
        var pref = localStorage.getItem(KEY) || 'system';
        var migrate = { dark: 'glass-dark', light: 'glass-light', glass: 'system', gpro: 'glass-dark', off: 'glass-light' };
        if (migrate[pref]) { pref = migrate[pref]; localStorage.setItem(KEY, pref); }
        var resolved = pref;
        if (pref === 'system') {
          resolved = matchMedia('(prefers-color-scheme: dark)').matches ? 'glass-dark' : 'glass-light';
        }
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.themePref = pref;
      } catch (_) {
        document.documentElement.dataset.theme = 'glass-light';
        document.documentElement.dataset.themePref = 'system';
      }
    })();
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app">
  <aside class="sb">
    <div class="sb-brand">
      <div class="sb-logo">L</div>
      <div class="sb-brand-name">LLM&nbsp;Limits</div>
    </div>
    <nav class="sb-nav">
      <button type="button" data-tab="dashboard" class="active" data-i18n="nav.dashboard"></button>
      <button type="button" data-tab="settings" data-i18n="nav.settings"></button>
      <button type="button" data-tab="about" data-i18n="nav.about"></button>
    </nav>

    <div class="sb-bottom">
      <div class="sb-row">
        <button type="button" id="aurora-toggle" class="aurora-toggle" aria-pressed="true" title="Background colors"><span class="swatch" aria-hidden="true"></span></button>
        <a id="github-link" class="github-link" href="https://github.com/KovalevAnton/llm-limits-tracker" target="_blank" rel="noopener" title="View on GitHub" aria-label="View on GitHub">
          <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        </a>
      </div>
      <div class="lang-pill" id="lang-pills" role="tablist" aria-label="Language">
        <button type="button" data-lang="en">EN</button>
        <button type="button" data-lang="es">ES</button>
        <button type="button" data-lang="ru">RU</button>
        <button type="button" data-lang="zh">中</button>
        <button type="button" data-lang="ja">日</button>
      </div>
      <div class="lang-pill" id="theme-pills" role="tablist" aria-label="Theme">
        <button type="button" data-theme-pick="system"      title="System">SYS</button>
        <button type="button" data-theme-pick="glass-light" title="Apple Glass — Light">Lt</button>
        <button type="button" data-theme-pick="glass-dark"  title="Apple Glass — Dark">Dk</button>
        <button type="button" data-theme-pick="hacker"      title="Hacker">Hx</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <section id="tab-dashboard">
      <h1 class="h2" data-i18n="dashboard.title"></h1>
      <p class="subtitle" data-i18n="dashboard.subtitle"></p>

      <div class="chips" id="chips"></div>
      <div class="alerts" id="alerts"></div>

      <div class="toolbar">
        <button class="btn-primary" id="refresh-btn" type="button"></button>
        <button class="btn-ghost" id="auto-refresh-toggle" type="button"></button>
        <span class="updated" id="updated-wrap">
          <span class="accentdot"></span>
          <span id="last-checked"></span>
        </span>
      </div>

      <div id="dashboard-body"></div>
    </section>

    <section id="tab-settings" class="hidden">
      <h1 class="h2" data-i18n="settings.title"></h1>
      <p class="subtitle" data-i18n="settings.subtitle"></p>
      <div class="grid" id="settings-grid"></div>
      <div class="card threshold-card">
        <h3 class="h3" data-i18n="settings.thresholds"></h3>
        <p class="help" data-i18n="settings.thresholdsHelp"></p>
        <div class="threshold-row">
          <div>
            <label data-i18n="settings.warnLabel"></label>
            <input type="text" id="threshold-warn" value="80" />
          </div>
          <div>
            <label data-i18n="settings.badLabel"></label>
            <input type="text" id="threshold-bad" value="95" />
          </div>
        </div>
      </div>
    </section>

    <section id="tab-about" class="hidden">
      <h1 class="h2" data-i18n="about.title"></h1>
      <p class="subtitle" data-i18n="about.subtitle"></p>
      <div class="card" id="about-card"></div>
    </section>
  </main>
</div>

<script src="app.js" defer></script>
</body>
</html>
